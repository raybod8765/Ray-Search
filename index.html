<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Search</title>
    <link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/previews/015/337/677/original/transparent-search-icon-free-png.png">
    <style>
        :root {
            --bg: #101010;
            --panel: #16161a;
            --accent: #5fa5ff;
            --text: #ffffff;
            --muted: #80808b;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* 1. STATE MANAGEMENT (Hiding/Showing Views) */
        .view-home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 97.511469999vh; }
        .view-results { display: none; }

        body.results-active .view-home { display: none; }
        body.results-active .view-results { display: block; }

        /* 2. HEADER (Visible on Results View) */
        header {
            display: flex; align-items: center;
            padding: 10px 30px; background: var(--panel);
            border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 9999;
        }

        .header-logo {
            font-weight: 900; color: var(--accent);
            margin-right: 30px; cursor: pointer; text-transform: uppercase;
        }

        /* 3. SEARCH BAR STYLING */
        .search-box {
            display: flex; align-items: center;
            background: #000; border: 1px solid #444;
            border-radius: 100px; width: 500px; height: 45px; padding: 0 15px;
            transition: border-color 0.3s;
        }

        .search-box:focus-within { border-color: var(--accent); }

        .search-input {
            flex: 1; background: transparent; border: none;
            color: white; font-size: 16px; outline: none;
        }

        .search-trigger { cursor: pointer; display: flex; align-items: center; }

        /* 4. HOME SPECIFIC */
        .home-logo {
            font-size: 80px; font-weight: 400; color: var(--accent);
            letter-spacing: -1px; margin-bottom: 25px;
        }

        /* 5. RESULTS CONTAINER (Fixed 1000px) */
        .results-wrapper {
            width: 1000px; margin: 30px auto; padding: 0 20px; box-sizing: border-box;
        }

        /* 6. GOOGLE DARK THEME OVERRIDES */
        .gsc-control-cse { background-color: transparent !important; border: none !important; padding: 0 !important; }
        .gsc-webResult.gsc-result, .gsc-table-result, .gsc-thumbnail-inside {
            background-color: transparent !important; border: none !important;
        }
        .gs-title, .gs-title b, .gsc-control-cse a { color: var(--accent) !important; text-decoration: none !important; }
        .gs-snippet { color: #aaa !important; line-height: 1.5 !important; }
        .gsc-url-top, .gs-visibleUrl { color: #4caf50 !important; }
        .gsc-search-box, .gcsc-branding, .gsc-adBlock { display: none !important; }
        .gsc-tabHeader{border: 1px solid white !important;background-color:#101010 !important;color:white !important;}
    </style>
</head>
<body>

    <!-- HOME VIEW -->
        <small><small><small><h6>Powered by Google</h6></small></small></small>
    <div id="home-state" class="view-home">
        <div class="home-logo">Search</DIV>
        <div class="search-box">
            <input type="text" id="home-input" class="search-input" placeholder="Search..." autofocus>
            <div class="search-trigger" onclick="runSearch('home-input')">
                <img class="searchicon" src="https://static.vecteezy.com/system/resources/previews/015/337/677/original/transparent-search-icon-free-png.png" width="45px" style="margin-right:-10px;">
            </div>
        </div>
    </div>

    <!-- RESULTS VIEW -->
    <div id="results-state" class="view-results">
        <header>
            <div class="header-logo" onclick="location.href=location.pathname"></div>
            <div class="search-box" style="width: 450px; height: 38px;">
                <input type="text" id="header-input" class="search-input">
                <div class="search-trigger" onclick="runSearch('header-input')">
                    <img class="searchicon" src="https://static.vecteezy.com/system/resources/previews/015/337/677/original/transparent-search-icon-free-png.png" width="30px" style="margin-right:-10px;">
                </div>
            </div>
        </header>

        <main class="results-wrapper">
            <div class="gcse-search"></div>
        </main>
    </div>

    <!-- SCRIPT LOADER -->
    <script async src="https://cse.google.com/cse.js?cx=27ef92da79bde4273"></script>

    <script>
        const hInput = document.getElementById('home-input');
        const rInput = document.getElementById('header-input');

        function runSearch(id) {
            const query = document.getElementById(id).value.trim();
            if (!query) return;

            // 1. Activate Results UI
            document.body.classList.add('results-active');
            rInput.value = query;

            // 2. Sync URL with /?q=
            const url = new URL(window.location);
            url.searchParams.set('q', query);
            window.history.pushState({}, '', url);

            // 3. Trigger Mechanism
            const execute = () => {
                const gInput = document.querySelector('input.gsc-input');
                const gBtn = document.querySelector('button.gsc-search-button');
                
                if (gInput && gBtn) {
                    gInput.value = query;
                    gBtn.click();
                } else {
                    setTimeout(execute, 200);
                }
            };
            execute();
        }

        // Enter Key Handlers
        hInput.addEventListener('keydown', e => { if(e.key === 'Enter') runSearch('home-input'); });
        rInput.addEventListener('keydown', e => { if(e.key === 'Enter') runSearch('header-input'); });

        // Handle URL on load
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                hInput.value = q;
                runSearch('home-input');
            }
        };

        // Handle browser Back/Forward
        window.onpopstate = () => {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q') || '';
            if (q) {
                hInput.value = q;
                runSearch('home-input');
            } else {
                document.body.classList.remove('results-active');
            }
        };
    </script>
</body>
</html>
